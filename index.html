<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat + Cờ Vua</title>

<link rel="stylesheet"
href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<style>
body{
  margin:0;
  display:flex;
  font-family:Arial;
  height:100vh;
  background:#1e1e1e;
  color:white;
}
.sidebar{
  width:200px;
  background:#111;
  padding:20px;
}
.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#333;
  color:white;
  border:none;
  cursor:pointer;
}
.main{
  flex:1;
  padding:20px;
}
.hidden{
  display:none;
}
#board{
  width:500px;
  margin:20px auto;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="showChat()">💬 Chat</button>
  <button onclick="showChess()">♟ Cờ vua</button>
</div>

<div class="main">

<div id="chatSection">
  <h2>Chat Demo</h2>
  <p>Chat vẫn hoạt động bình thường.</p>
</div>

<div id="chessSection" class="hidden">
  <h2 style="text-align:center">Bàn Cờ</h2>
  <div id="board"></div>
</div>

</div>

<script>

function showChat(){
  document.getElementById("chatSection").classList.remove("hidden");
  document.getElementById("chessSection").classList.add("hidden");
}

function showChess(){
  document.getElementById("chatSection").classList.add("hidden");
  document.getElementById("chessSection").classList.remove("hidden");

  setTimeout(initBoard,100); // đảm bảo render đúng
}

var board=null;
var game=new Chess();

function initBoard(){
  if(board!==null) return;

  board=Chessboard('board',{
    draggable:true,
    position:'start'
  });
}

</script>

</body>
</html>
