<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Cờ Vua + Chat</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stockfish@16.1.0/src/stockfish.js"></script>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
}

.left{
  width:60%;
  text-align:center;
  padding:20px;
}

.right{
  width:40%;
  border-left:1px solid #333;
  display:flex;
  flex-direction:column;
}

#board{
  width:480px;
  height:480px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  border:4px solid #555;
}

.square{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
  cursor:pointer;
}

.light{ background:#f0d9b5; color:black; }
.dark{ background:#b58863; color:black; }

.controls{
  margin:10px;
}

.timer{
  font-size:20px;
  margin-top:10px;
}

#chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

#chatInput{
  display:flex;
}

#chatInput input{
  flex:1;
  padding:10px;
}

#chatInput button{
  padding:10px;
}
</style>
</head>

<body>

<div class="left">
<h2>♟ AI Cờ Vua</h2>

<div class="controls">
Cấp độ:
<select id="level">
<option value="5">Dễ</option>
<option value="10" selected>Trung bình</option>
<option value="18">Khó</option>
<option value="22">Siêu khó</option>
</select>

<button onclick="newGame()">Ván mới</button>
</div>

<div id="board"></div>

<div class="timer">
⚪ Trắng: <span id="whiteTimer">0:00</span> |
⚫ Đen: <span id="blackTimer">0:00</span>
</div>

</div>

<div class="right">
<h3 style="text-align:center;">💬 Chat AI</h3>
<div id="chat"></div>

<div id="chatInput">
<input type="text" id="userMsg" placeholder="Nhắn AI...">
<button onclick="sendMsg()">Gửi</button>
</div>
</div>

<script>
let game = new Chess();
let engine = new Worker("https://cdn.jsdelivr.net/npm/stockfish@16.1.0/src/stockfish.js");

let selectedSquare=null;
let whiteTime=0;
let blackTime=0;
let currentTurn="white";

function formatTime(sec){
  let m=Math.floor(sec/60);
  let s=sec%60;
  return m+":"+(s<10?"0":"")+s;
}

setInterval(()=>{
  if(currentTurn==="white"){
    whiteTime++;
    document.getElementById("whiteTimer").innerText=formatTime(whiteTime);
  }else{
    blackTime++;
    document.getElementById("blackTimer").innerText=formatTime(blackTime);
  }
},1000);

function drawBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";
  let position=game.board();

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let square=document.createElement("div");
      square.className="square "+((r+c)%2==0?"light":"dark");
      square.dataset.row=r;
      square.dataset.col=c;

      let piece=position[r][c];
      if(piece){
        square.innerText=getUnicode(piece);
      }

      square.onclick=()=>handleClick(r,c);
      board.appendChild(square);
    }
  }
}

function getUnicode(piece){
  const map={
    p:{w:"♙",b:"♟"},
    r:{w:"♖",b:"♜"},
    n:{w:"♘",b:"♞"},
    b:{w:"♗",b:"♝"},
    q:{w:"♕",b:"♛"},
    k:{w:"♔",b:"♚"}
  };
  return map[piece.type][piece.color];
}

function handleClick(r,c){
  let square=String.fromCharCode(97+c)+(8-r);

  if(!selectedSquare){
    selectedSquare=square;
  }else{
    let move=game.move({
      from:selectedSquare,
      to:square,
      promotion:'q'
    });

    selectedSquare=null;

    if(move){
      currentTurn="black";
      drawBoard();
      setTimeout(aiMove,200);
    }
  }
}

function aiMove(){
  let level=document.getElementById("level").value;
  engine.postMessage("position fen "+game.fen());
  engine.postMessage("go depth "+level);

  engine.onmessage=function(e){
    if(e.data.startsWith("bestmove")){
      let best=e.data.split(" ")[1];
      game.move({
        from:best.substring(0,2),
        to:best.substring(2,4),
        promotion:'q'
      });
      currentTurn="white";
      drawBoard();
    }
  };
}

function newGame(){
  game.reset();
  whiteTime=0;
  blackTime=0;
  currentTurn="white";
  drawBoard();
}

function sendMsg(){
  let input=document.getElementById("userMsg");
  let chat=document.getElementById("chat");

  if(!input.value) return;

  chat.innerHTML+="<div>👤 "+input.value+"</div>";
  chat.innerHTML+="<div>🤖 AI: Mình đang tập trung đánh cờ 😄</div>";
  chat.scrollTop=chat.scrollHeight;

  input.value="";
}

drawBoard();
</script>

</body>
</html>
