<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess</title>
<style>
body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:#222;
  font-family:sans-serif;
}

#controls{
  margin-bottom:15px;
}

button{
  padding:8px 16px;
  margin:0 5px;
  cursor:pointer;
}

#board{
  width:480px;
  height:480px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:42px;
  cursor:pointer;
}

.light{ background:#f0d9b5; }
.dark{ background:#b58863; }

.selected{
  outline:3px solid cyan;
}

.white-piece{
  color:white;
  text-shadow:0 0 5px black;
}

.black-piece{
  color:black;
}

</style>
</head>
<body>

<div id="controls">
  <button onclick="startGame('white')">Chơi Trắng</button>
  <button onclick="startGame('black')">Chơi Đen</button>
</div>

<div id="board"></div>

<script>

const board = document.getElementById("board");

const pieces = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

let playerColor="white";
let currentTurn="white";
let selected=null;
let gameState;

function resetBoard(){
gameState=[
["r","n","b","q","k","b","n","r"],
["p","p","p","p","p","p","p","p"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["P","P","P","P","P","P","P","P"],
["R","N","B","Q","K","B","N","R"]
];
}

function startGame(color){
playerColor=color;
currentTurn="white";
selected=null;
resetBoard();
drawBoard();

if(playerColor==="black"){
makeAIMove();
}
}

function drawBoard(){
board.innerHTML="";

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

let displayRow = playerColor==="white" ? r : 7-r;
let displayCol = playerColor==="white" ? c : 7-c;

const square=document.createElement("div");
square.classList.add("square");
square.classList.add((r+c)%2==0?"light":"dark");

const piece=gameState[displayRow][displayCol];

if(piece){
const span=document.createElement("span");
span.textContent=pieces[piece];

if(piece===piece.toUpperCase()){
span.classList.add("white-piece");
}else{
span.classList.add("black-piece");
}

square.appendChild(span);
}

square.addEventListener("click",()=>handleClick(displayRow,displayCol));

board.appendChild(square);
}
}
}

function handleClick(r,c){

if(currentTurn!==playerColor) return;

const piece=gameState[r][c];

if(!selected){
if(!piece) return;

if(playerColor==="white" && piece===piece.toLowerCase()) return;
if(playerColor==="black" && piece===piece.toUpperCase()) return;

selected={row:r,col:c};
drawBoard();
highlightSquare(r,c);
return;
}

movePiece(selected.row,selected.col,r,c);
selected=null;

currentTurn = currentTurn==="white"?"black":"white";
drawBoard();

if(currentTurn!==playerColor){
makeAIMove();
}
}

function highlightSquare(r,c){
const index = playerColor==="white"
? r*8+c
: (7-r)*8+(7-c);

board.children[index].classList.add("selected");
}

function movePiece(sr,sc,tr,tc){
const piece=gameState[sr][sc];
gameState[tr][tc]=piece;
gameState[sr][sc]="";
}

function convertToFEN(){
let fen="";

for(let r=0;r<8;r++){
let empty=0;
for(let c=0;c<8;c++){
const piece=gameState[r][c];
if(piece===""){
empty++;
}else{
if(empty>0){fen+=empty; empty=0;}
fen+=piece;
}
}
if(empty>0) fen+=empty;
if(r<7) fen+="/";
}

fen += (currentTurn==="white"?" w ":" b ") + "- - 0 1";
return fen;
}

const engine = new Worker("https://cdn.jsdelivr.net/npm/stockfish/stockfish.js");
engine.postMessage("uci");

engine.onmessage = function(event){
if(event.data.includes("bestmove")){
const move=event.data.split(" ")[1];
if(move==="(none)") return;

const from=move.substring(0,2);
const to=move.substring(2,4);

const sr=8-parseInt(from[1]);
const sc=from.charCodeAt(0)-97;

const tr=8-parseInt(to[1]);
const tc=to.charCodeAt(0)-97;

movePiece(sr,sc,tr,tc);

currentTurn = currentTurn==="white"?"black":"white";
drawBoard();
}
};

function makeAIMove(){
const fen=convertToFEN();
engine.postMessage("position fen "+fen);
engine.postMessage("go depth 12");
}

startGame("white");

</script>

</body>
</html>
