<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cờ Vua AI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stockfish@16.1.0/src/stockfish.js"></script>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
}
.container{
  display:flex;
  margin-top:20px;
}
#board{
  width:480px;
  height:480px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  border:4px solid #555;
}
.square{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
  cursor:pointer;
}
.light{ background:#f0d9b5; color:black; }
.dark{ background:#b58863; color:black; }

.right{
  width:300px;
  margin-left:20px;
  display:flex;
  flex-direction:column;
}
#chat{
  flex:1;
  background:#222;
  padding:10px;
  overflow-y:auto;
}
input{
  padding:8px;
}
button{
  padding:8px;
}
</style>
</head>
<body>

<div class="container">

<div>
<h2>♟ AI Cờ Vua</h2>
<button onclick="newGame()">Ván mới</button>
<div id="board"></div>
</div>

<div class="right">
<h3>💬 Chat AI</h3>
<div id="chat"></div>
<div>
<input id="msg" placeholder="Nhắn AI...">
<button onclick="sendMsg()">Gửi</button>
</div>
</div>

</div>

<script>
let game = new Chess();
let engine = STOCKFISH(); // KHÔNG dùng Worker nữa
let selected = null;

function drawBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";
  let pos=game.board();

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let sq=document.createElement("div");
      sq.className="square "+((r+c)%2==0?"light":"dark");
      let piece=pos[r][c];
      if(piece) sq.innerText=getUnicode(piece);
      sq.onclick=()=>clickSquare(r,c);
      board.appendChild(sq);
    }
  }
}

function getUnicode(p){
  const m={
    p:{w:"♙",b:"♟"},
    r:{w:"♖",b:"♜"},
    n:{w:"♘",b:"♞"},
    b:{w:"♗",b:"♝"},
    q:{w:"♕",b:"♛"},
    k:{w:"♔",b:"♚"}
  };
  return m[p.type][p.color];
}

function clickSquare(r,c){
  let sq=String.fromCharCode(97+c)+(8-r);
  if(!selected){
    selected=sq;
  }else{
    let move=game.move({from:selected,to:sq,promotion:"q"});
    selected=null;
    if(move){
      drawBoard();
      setTimeout(aiMove,200);
    }
  }
}

function aiMove(){
  engine.postMessage("position fen "+game.fen());
  engine.postMessage("go depth 10");
  engine.onmessage=function(e){
    if(e.data.startsWith("bestmove")){
      let best=e.data.split(" ")[1];
      game.move({from:best.substring(0,2),to:best.substring(2,4),promotion:"q"});
      drawBoard();
    }
  }
}

function newGame(){
  game.reset();
  drawBoard();
}

function sendMsg(){
  let msg=document.getElementById("msg");
  let chat=document.getElementById("chat");
  if(!msg.value) return;
  chat.innerHTML+="<div>👤 "+msg.value+"</div>";
  chat.innerHTML+="<div>🤖 AI: Mình đang đánh cờ 😄</div>";
  chat.scrollTop=chat.scrollHeight;
  msg.value="";
}

drawBoard();
</script>

</body>
</html>
