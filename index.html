<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chess AI</title>

<style>
body {
  background: #1e1e1e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: Arial;
}

#board {
  width: 480px;
  height: 480px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 4px solid #333;
}

.square {
  width: 60px;
  height: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  cursor: grab;
  user-select: none;
}

.light { background: #f0d9b5; }
.dark { background: #b58863; }

.square:active {
  cursor: grabbing;
}
</style>
</head>

<body>

<div id="board"></div>

<script>
const board = document.getElementById("board");

const pieces = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

const startPosition = [
  "rnbqkbnr",
  "pppppppp",
  "........",
  "........",
  "........",
  "........",
  "PPPPPPPP",
  "RNBQKBNR"
];

let draggedPiece = null;

function createBoard() {
  board.innerHTML = "";
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const square = document.createElement("div");
      square.classList.add("square");
      square.classList.add((row + col) % 2 === 0 ? "light" : "dark");

      const piece = startPosition[row][col];
      if (piece !== ".") {
        square.textContent = pieces[piece];
        square.draggable = true;
      }

      square.dataset.row = row;
      square.dataset.col = col;

      board.appendChild(square);
    }
  }
}

createBoard();


// ===== DRAG & DROP FIX HOÀN CHỈNH =====

board.addEventListener("dragstart", function(e) {
  if (e.target.classList.contains("square") && e.target.textContent !== "") {
    draggedPiece = e.target;

    // Ẩn bóng mờ mặc định
    const img = new Image();
    img.src =
      "data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxJyBoZWlnaHQ9JzEnPjwvc3ZnPg==";
    e.dataTransfer.setDragImage(img, 0, 0);
  }
});

board.addEventListener("dragover", function(e) {
  e.preventDefault();
});

board.addEventListener("drop", function(e) {
  if (!draggedPiece) return;

  const target = e.target;

  if (target.classList.contains("square")) {

    if (target !== draggedPiece) {
      target.textContent = draggedPiece.textContent;
      draggedPiece.textContent = "";
    }

    draggedPiece = null;
  }
});

</script>

</body>
</html>
