<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat + Cờ Vua</title>

<link rel="stylesheet"
href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<style>
body{
  margin:0;
  display:flex;
  font-family:Arial;
  height:100vh;
  background:#121212;
  color:white;
}
.sidebar{
  width:200px;
  background:#1f1f1f;
  padding:20px;
}
.sidebar button{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#333;
  color:white;
  border:none;
  cursor:pointer;
}
.main{
  flex:1;
  padding:20px;
}
.hidden{ display:none; }
#board{
  width:500px;
  margin:20px auto;
}
.timers{
  text-align:center;
  font-size:20px;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="showChat()">💬 Chat</button>
  <button onclick="showChess()">♟ Cờ vua</button>
</div>

<div class="main">

<!-- CHAT -->
<div id="chatSection">
  <h2>Chat Demo</h2>
  <div id="chatBox"></div>
  <input id="chatInput" placeholder="Nhập..." 
  onkeydown="if(event.key==='Enter') sendMessage()">
  <button onclick="sendMessage()">Gửi</button>
</div>

<!-- CHESS -->
<div id="chessSection" class="hidden">
  <h2 style="text-align:center">Bàn Cờ</h2>
  <div id="board"></div>
  <div class="timers">
    ⚪ Trắng: <span id="whiteTimer">0:00</span> |
    ⚫ Đen: <span id="blackTimer">0:00</span>
  </div>
</div>

</div>

<script>

//////////////// CHAT //////////////////

function sendMessage(){
  const input=document.getElementById("chatInput");
  if(!input.value.trim()) return;

  document.getElementById("chatBox").innerHTML +=
  "<div><b>Bạn:</b> "+input.value+"</div>";

  setTimeout(()=>{
    document.getElementById("chatBox").innerHTML +=
    "<div><b>AI:</b> Tôi đang chạy bản demo 😎</div>";
  },500);

  input.value="";
}

function showChat(){
  document.getElementById("chatSection").classList.remove("hidden");
  document.getElementById("chessSection").classList.add("hidden");
}

function showChess(){
  document.getElementById("chatSection").classList.add("hidden");
  document.getElementById("chessSection").classList.remove("hidden");
  setTimeout(initBoard,100);
}

//////////////// CHESS //////////////////

let board=null;
let game=new Chess();

let whiteTime=0;
let blackTime=0;
let currentTurn="white";
let timerInterval=null;

function formatTime(sec){
  let m=Math.floor(sec/60);
  let s=sec%60;
  return m+":"+(s<10?"0":"")+s;
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);

  timerInterval=setInterval(()=>{
    if(currentTurn==="white"){
      whiteTime++;
      document.getElementById("whiteTimer").innerText=formatTime(whiteTime);
    }else{
      blackTime++;
      document.getElementById("blackTimer").innerText=formatTime(blackTime);
    }
  },1000);
}

function initBoard(){
  if(board!==null) return;

  board=Chessboard('board',{
    draggable:true,
    position:'start',
    pieceTheme:
'https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png',
    onDrop:onDrop
  });

  startTimer();
}

function onDrop(source,target){
  let move=game.move({
    from:source,
    to:target,
    promotion:'q'
  });

  if(move===null) return 'snapback';

  currentTurn="black";
  setTimeout(aiMove,500);
}

function aiMove(){
  let moves=game.moves();
  if(moves.length===0) return;

  let randomMove=moves[Math.floor(Math.random()*moves.length)];
  game.move(randomMove);
  board.position(game.fen());

  currentTurn="white";
}

</script>

</body>
</html>
