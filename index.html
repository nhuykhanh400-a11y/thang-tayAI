<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Chat + Cờ vua</title>

<!-- Chess libs -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://cdn.jsdelivr.net/npm/chess.js@latest/dist/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  display:flex;
  height:100vh;
  background:#0f172a;
  color:white;
}

/* Sidebar */
#sidebar{
  width:200px;
  background:#111827;
  padding:20px;
}

.tab{
  padding:10px;
  margin-bottom:10px;
  background:#1f2937;
  cursor:pointer;
  border-radius:8px;
}

.tab:hover{
  background:#374151;
}

/* Main */
#main{
  flex:1;
  padding:20px;
}

/* Chat */
#chat-area{
  display:block;
}

#chat-box{
  height:400px;
  overflow:auto;
  background:#1e293b;
  padding:10px;
  margin-bottom:10px;
}

/* Chess */
#chess-area{
  display:none;
}

#board{
  width:400px;
  margin-top:10px;
}

input{
  padding:8px;
}

button{
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="tab" onclick="showChat()">Chat</div>
  <div class="tab" onclick="showChess()">Cờ vua</div>
</div>

<!-- Main -->
<div id="main">

  <!-- CHAT -->
  <div id="chat-area">
    <h2>AI Chat</h2>
    <div id="chat-box"></div>
    <input id="message-input" placeholder="Nhập tin nhắn..." style="width:80%">
    <button onclick="sendMessage()">Gửi</button>
  </div>

  <!-- CHESS -->
  <div id="chess-area">
    <h2>Đấu với AI</h2>
    <div id="board"></div>
    <button onclick="newGame()">Ván mới</button>
  </div>

</div>

<script>

/* ================= TAB SWITCH ================= */

function showChat(){
  document.getElementById("chat-area").style.display="block";
  document.getElementById("chess-area").style.display="none";
}

function showChess(){
  document.getElementById("chat-area").style.display="none";
  document.getElementById("chess-area").style.display="block";
}

/* ================= CHAT ================= */

async function sendMessage(){
  const input=document.getElementById("message-input");
  const msg=input.value.trim();
  if(!msg) return;

  const box=document.getElementById("chat-box");
  box.innerHTML += "<div>> "+msg+"</div>";

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data=await res.json();
  box.innerHTML += "<div><b>AI:</b> "+(data.reply || "Lỗi")+"</div>";
  input.value="";
  box.scrollTop=box.scrollHeight;
}

document.getElementById("message-input").addEventListener("keypress",function(e){
  if(e.key==="Enter"){
    sendMessage();
  }
});

/* ================= CHESS ================= */

let board;
let game;
let engine;
let playerColor;

function newGame(){
  game = new Chess();
  playerColor = Math.random() < 0.5 ? 'white' : 'black';

  board = Chessboard('board', {
    draggable: true,
    position: 'start',
    orientation: playerColor,
    onDrop: onDrop
  });

  engine = new Worker("https://cdn.jsdelivr.net/npm/stockfish@latest/stockfish.js");

  engine.onmessage = function(event){
    if(event.data.startsWith("bestmove")){
      const move = event.data.split(" ")[1];
      game.move({
        from: move.substring(0,2),
        to: move.substring(2,4),
        promotion:'q'
      });
      board.position(game.fen());
    }
  };

  if(playerColor === 'black'){
    makeAIMove();
  }
}

function onDrop(source, target){
  const move = game.move({
    from: source,
    to: target,
    promotion:'q'
  });

  if(move === null) return 'snapback';

  setTimeout(makeAIMove, 200);
}

function makeAIMove(){
  engine.postMessage("position fen " + game.fen());
  engine.postMessage("go depth 15"); // tăng lên 20 nếu muốn mạnh hơn
}

newGame();

</script>

</body>
</html>
