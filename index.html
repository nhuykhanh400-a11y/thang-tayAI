<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Cờ Vua</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
}
.container{
  display:flex;
  margin-top:20px;
}
#board{
  width:480px;
  height:480px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  border:4px solid #555;
}
.square{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
  cursor:pointer;
}
.light{ background:#f0d9b5; color:black; }
.dark{ background:#b58863; color:black; }

.right{
  width:300px;
  margin-left:20px;
  display:flex;
  flex-direction:column;
}
#chat{
  flex:1;
  background:#222;
  padding:10px;
  overflow-y:auto;
}
input{
  padding:8px;
}
button{
  padding:8px;
}
</style>
</head>
<body>

<div class="container">

<div>
<h2>♟ AI Cờ Vua</h2>
<button onclick="newGame()">Ván mới</button>
<div id="board"></div>
</div>

<div class="right">
<h3>💬 Chat AI</h3>
<div id="chat"></div>
<div>
<input id="msg" placeholder="Nhắn AI...">
<button onclick="sendMsg()">Gửi</button>
</div>
</div>

</div>

<script>
let game = new Chess();
let selected = null;

function drawBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";
  let pos=game.board();

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let sq=document.createElement("div");
      sq.className="square "+((r+c)%2==0?"light":"dark");
      let piece=pos[r][c];
      if(piece) sq.innerText=getUnicode(piece);
      sq.onclick=()=>clickSquare(r,c);
      board.appendChild(sq);
    }
  }
}

function getUnicode(p){
  const m={
    p:{w:"♙",b:"♟"},
    r:{w:"♖",b:"♜"},
    n:{w:"♘",b:"♞"},
    b:{w:"♗",b:"♝"},
    q:{w:"♕",b:"♛"},
    k:{w:"♔",b:"♚"}
  };
  return m[p.type][p.color];
}

function clickSquare(r,c){
  let sq=String.fromCharCode(97+c)+(8-r);
  if(!selected){
    if(game.get(sq)) selected=sq;
  }else{
    let move=game.move({from:selected,to:sq,promotion:"q"});
    selected=null;
    if(move){
      drawBoard();
      setTimeout(aiMove,200);
    }
  }
}

function aiMove(){
  let moves = game.moves();
  if(moves.length === 0) return;
  let randomMove = moves[Math.floor(Math.random()*moves.length)];
  game.move(randomMove);
  drawBoard();
}

function newGame(){
  game.reset();
  drawBoard();
}

/* CHAT AI TRẢ LỜI BÌNH THƯỜNG */

function sendMsg(){
  let msg=document.getElementById("msg");
  let chat=document.getElementById("chat");
  if(!msg.value) return;

  let userText = msg.value.toLowerCase();
  chat.innerHTML+="<div>👤 "+msg.value+"</div>";

  let reply = getAIReply(userText);
  chat.innerHTML+="<div>🤖 "+reply+"</div>";

  chat.scrollTop=chat.scrollHeight;
  msg.value="";
}

function getAIReply(text){

  if(text.includes("khai cuoc"))
    return "Bạn có thể thử khai cuộc Ý: e4 e5 Nf3 Nc6 Bc4.";

  if(text.includes("trung cuoc"))
    return "Trung cuộc nên kiểm soát trung tâm và phát triển quân.";

  if(text.includes("hau cuoc"))
    return "Hậu cuộc nên kích hoạt vua và đẩy tốt thông minh.";

  if(text.includes("mat hau"))
    return "Mất hậu thường rất bất lợi, cố đổi quân để cân bằng.";

  if(text.includes("thang"))
    return "Muốn thắng hãy kiểm soát trung tâm và không treo quân.";

  return "Cờ vua là trò chơi chiến thuật rất sâu. Bạn muốn hỏi về khai cuộc hay chiến thuật?";
}

drawBoard();
</script>

</body>
</html>
