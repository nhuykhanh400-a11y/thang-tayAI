<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>AI người Tây</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    h1 {
      color: white;
      padding: 20px;
      margin: 0;
    }

    #chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .user-message {
      align-self: flex-end;
      background: #2563eb;
      color: white;
      padding: 10px 15px;
      border-radius: 15px 15px 0 15px;
      max-width: 70%;
    }

    .ai-message {
      align-self: flex-start;
      background: #1e293b;
      color: white;
      padding: 10px 15px;
      border-radius: 15px 15px 15px 0;
      max-width: 70%;
    }

    #input-area {
      display: flex;
      padding: 15px;
      background: #111827;
    }

    #message-input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    #send-btn {
      margin-left: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    #send-btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <h1>AI người Tây</h1>

  <div id="chat-box"></div>

  <div id="input-area">
    <input 
      type="text" 
      id="message-input" 
      placeholder="Nhập tin nhắn..."
      autocomplete="off"
    >
    <button id="send-btn">Gửi</button>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");

    function addMessage(role, text) {
      const messageDiv = document.createElement("div");
      messageDiv.className = role === "user" ? "user-message" : "ai-message";
      messageDiv.innerText = text;
      chatBox.appendChild(messageDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      input.value = "";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await res.json();

        if (data.reply) {
          addMessage("ai", data.reply);
        } else {
          addMessage("ai", "Có lỗi xảy ra...");
        }

      } catch (err) {
        addMessage("ai", "Lỗi kết nối server.");
        console.error(err);
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    // Nhấn Enter để gửi
    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
