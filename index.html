<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Chat + Cờ vua Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://cdn.jsdelivr.net/npm/chess.js@latest/dist/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<style>
body{
  margin:0;
  display:flex;
  height:100vh;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

#sidebar{
  width:200px;
  background:#111827;
  padding:20px;
}

.tab{
  padding:10px;
  margin-bottom:10px;
  background:#1f2937;
  cursor:pointer;
  border-radius:8px;
}

.tab:hover{
  background:#374151;
}

#main{
  flex:1;
  padding:20px;
}

#chat-area{ display:block; }
#chess-area{ display:none; }

#chat-box{
  height:400px;
  overflow:auto;
  background:#1e293b;
  padding:10px;
  margin-bottom:10px;
}

#board{
  width:400px;
  margin-top:10px;
}

.clock{
  font-size:22px;
  margin:5px 0;
}

select, button, input{
  padding:6px;
}
</style>
</head>

<body>

<div id="sidebar">
  <div class="tab" onclick="showChat()">Chat</div>
  <div class="tab" onclick="showChess()">Cờ vua</div>
</div>

<div id="main">

<!-- CHAT -->
<div id="chat-area">
  <h2>AI Chat</h2>
  <div id="chat-box"></div>
  <input id="message-input" placeholder="Nhập tin nhắn..." style="width:80%">
  <button onclick="sendMessage()">Gửi</button>
</div>

<!-- CHESS -->
<div id="chess-area">
  <h2>Đấu với AI</h2>

  <div>
    Cấp độ AI:
    <select id="level">
      <option value="5">Dễ</option>
      <option value="10" selected>Trung bình</option>
      <option value="15">Khó</option>
      <option value="20">Siêu khó</option>
    </select>
  </div>

  <div class="clock">Bạn: <span id="player-time">05:00</span></div>
  <div class="clock">AI: <span id="ai-time">05:00</span></div>

  <div id="board"></div>

  <button onclick="newGame()">Ván mới</button>
</div>

</div>

<script>

/* ===== TAB ===== */
function showChat(){
  document.getElementById("chat-area").style.display="block";
  document.getElementById("chess-area").style.display="none";
}
function showChess(){
  document.getElementById("chat-area").style.display="none";
  document.getElementById("chess-area").style.display="block";
}

/* ===== CHAT ===== */
async function sendMessage(){
  const input=document.getElementById("message-input");
  const msg=input.value.trim();
  if(!msg) return;

  const box=document.getElementById("chat-box");
  box.innerHTML += "<div>> "+msg+"</div>";

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data=await res.json();
  box.innerHTML += "<div><b>AI:</b> "+(data.reply||"Lỗi")+"</div>";
  input.value="";
  box.scrollTop=box.scrollHeight;
}

document.getElementById("message-input").addEventListener("keypress",function(e){
  if(e.key==="Enter") sendMessage();
});

/* ===== CHESS ===== */

let board, game, engine;
let playerColor;
let playerTime = 300;
let aiTime = 300;
let timerInterval;
let currentTurn;

function formatTime(seconds){
  const m = Math.floor(seconds/60);
  const s = seconds%60;
  return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function updateClocks(){
  document.getElementById("player-time").innerText=formatTime(playerTime);
  document.getElementById("ai-time").innerText=formatTime(aiTime);
}

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(currentTurn==="player"){
      playerTime--;
      if(playerTime<=0){ alert("Bạn hết giờ!"); clearInterval(timerInterval); }
    }else{
      aiTime--;
      if(aiTime<=0){ alert("AI hết giờ!"); clearInterval(timerInterval); }
    }
    updateClocks();
  },1000);
}

function newGame(){
  game = new Chess();
  playerTime=300;
  aiTime=300;
  updateClocks();

  playerColor = Math.random()<0.5?'white':'black';

  board = Chessboard('board',{
    draggable:true,
    position:'start',
    orientation:playerColor,
    onDrop:onDrop
  });

  engine = new Worker("https://cdn.jsdelivr.net/npm/stockfish@latest/stockfish.js");

  engine.onmessage=function(event){
    if(event.data.startsWith("bestmove")){
      const move = event.data.split(" ")[1];
      game.move({
        from: move.substring(0,2),
        to: move.substring(2,4),
        promotion:'q'
      });
      board.position(game.fen());

      currentTurn="player";
      startTimer();
    }
  };

  if(playerColor==='white'){
    currentTurn="player";
  }else{
    currentTurn="ai";
    makeAIMove();
  }

  startTimer();
}

function onDrop(source,target){
  if((game.turn()==='w' && playerColor!=='white') ||
     (game.turn()==='b' && playerColor!=='black')){
    return 'snapback';
  }

  const move=game.move({
    from:source,
    to:target,
    promotion:'q'
  });

  if(move===null) return 'snapback';

  currentTurn="ai";
  startTimer();

  setTimeout(makeAIMove,200);
}

function makeAIMove(){
  const depth=document.getElementById("level").value;
  engine.postMessage("position fen "+game.fen());
  engine.postMessage("go depth "+depth);
}

newGame();

</script>

</body>
</html>
