<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess</title>
<style>
/* GIỮ NGUYÊN CSS */
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#222;
}

#board{
  width:480px;
  height:480px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  cursor:pointer;
  position:relative;
}

.light{ background:#f0d9b5; }
.dark{ background:#b58863; }

.highlight{
  background:#fff176 !important;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
}

.capture{
  background:#ff6b6b !important;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
}

.selected{
  outline:3px solid cyan;
}

.piece{
  user-select:none;
}
</style>
</head>
<body>

<div id="board"></div>

<script>

/* ======= TOÀN BỘ CODE CŨ GIỮ NGUYÊN ======= */
/* (mình không sửa gì phần logic cờ của bạn) */

const board = document.getElementById("board");

const pieces = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

let gameState = [
["r","n","b","q","k","b","n","r"],
["p","p","p","p","p","p","p","p"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["P","P","P","P","P","P","P","P"],
["R","N","B","Q","K","B","N","R"]
];

let selected = null;
let currentTurn = "white";

function drawBoard(){
  board.innerHTML="";
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const square=document.createElement("div");
      square.classList.add("square");
      square.classList.add((r+c)%2==0?"light":"dark");
      square.dataset.row=r;
      square.dataset.col=c;

      const piece=gameState[r][c];
      if(piece){
        const span=document.createElement("span");
        span.textContent=pieces[piece];
        span.classList.add("piece");
        square.appendChild(span);
      }

      square.addEventListener("click",()=>handleClick(r,c));
      board.appendChild(square);
    }
  }
}

function handleClick(r,c){

  if(currentTurn !== "white") return; // 👈 CHỈ CHO TRẮNG ĐI

  const piece = gameState[r][c];

  if(!selected){
    if(!piece) return;
    if(piece===piece.toLowerCase()) return;

    selected = {row:r,col:c};
    return;
  }

  movePiece(selected.row,selected.col,r,c);
  selected=null;
  currentTurn="black";
  drawBoard();

  makeAIMove(); // 👈 GỌI AI SAU KHI TRẮNG ĐI
}

function movePiece(sr,sc,tr,tc){
  const piece = gameState[sr][sc];
  gameState[tr][tc]=piece;
  gameState[sr][sc]="";
}

function convertToFEN(){
    let fen = "";

    for(let r=0; r<8; r++){
        let empty = 0;

        for(let c=0; c<8; c++){
            const piece = gameState[r][c];

            if(piece === ""){
                empty++;
            } else {
                if(empty > 0){
                    fen += empty;
                    empty = 0;
                }
                fen += piece;
            }
        }

        if(empty > 0) fen += empty;
        if(r < 7) fen += "/";
    }

    fen += " b - - 0 1"; // 👈 ĐẾN LƯỢT ĐEN
    return fen;
}

drawBoard();

</script>

<!-- ===== PHẦN AI ĐÃ SỬA ===== -->

<script>
const engine = new Worker("https://cdn.jsdelivr.net/npm/stockfish/stockfish.js");

engine.postMessage("uci");

engine.onmessage = function(event) {
    if (event.data.includes("bestmove")) {
        const move = event.data.split(" ")[1];

        const from = move.substring(0,2);
        const to = move.substring(2,4);

        const sr = 8 - parseInt(from[1]);
        const sc = from.charCodeAt(0) - 97;

        const tr = 8 - parseInt(to[1]);
        const tc = to.charCodeAt(0) - 97;

        movePiece(sr, sc, tr, tc);
        currentTurn="white";
        drawBoard();
    }
};

function makeAIMove() {
    const fen = convertToFEN();
    engine.postMessage("position fen " + fen);
    engine.postMessage("go depth 15");
}
</script>

</body>
</html>
