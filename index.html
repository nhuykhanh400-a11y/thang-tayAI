<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Cờ Vua Pro</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stockfish@16.1.0/src/stockfish.js"></script>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}
#board{
  width:480px;
  margin:20px auto;
}
.controls{
  margin-top:10px;
}
select,button{
  padding:6px;
  margin:5px;
}
.timer{
  font-size:20px;
  margin-top:10px;
}
.moves{
  max-height:150px;
  overflow-y:auto;
  background:#222;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>♟ AI Cờ Vua Pro</h2>

<div>
Cấp độ:
<select id="level">
<option value="5">Dễ</option>
<option value="10" selected>Trung bình</option>
<option value="18">Khó</option>
<option value="22">Siêu khó</option>
</select>

<button onclick="newGame()">Ván mới</button>
</div>

<div id="board"></div>

<div class="timer">
⚪ Trắng: <span id="whiteTimer">0:00</span> |
⚫ Đen: <span id="blackTimer">0:00</span>
</div>

<div class="moves" id="moveHistory"></div>

<script>

let board, game, engine;

let whiteTime=0;
let blackTime=0;
let currentTurn="white";
let timerInterval=null;

function formatTime(sec){
  let m=Math.floor(sec/60);
  let s=sec%60;
  return m+":"+(s<10?"0":"")+s;
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);

  timerInterval=setInterval(()=>{
    if(currentTurn==="white"){
      whiteTime++;
      document.getElementById("whiteTimer").innerText=formatTime(whiteTime);
    }else{
      blackTime++;
      document.getElementById("blackTimer").innerText=formatTime(blackTime);
    }
  },1000);
}

function newGame(){
  game=new Chess();
  board.position('start');
  document.getElementById("moveHistory").innerHTML="";
  whiteTime=0;
  blackTime=0;
  currentTurn="white";
  startTimer();
}

function addMove(move){
  let history=document.getElementById("moveHistory");
  history.innerHTML += move+" ";
  history.scrollTop=history.scrollHeight;

  localStorage.setItem("lastGame", game.pgn());
}

function onDrop(source,target){
  let move=game.move({
    from:source,
    to:target,
    promotion:'q'
  });

  if(move===null) return 'snapback';

  addMove(move.san);

  currentTurn="black";
  setTimeout(aiMove,200);
}

function aiMove(){
  let level=document.getElementById("level").value;

  engine.postMessage("position fen "+game.fen());
  engine.postMessage("go depth "+level);

  engine.onmessage=function(event){
    if(event.data.startsWith("bestmove")){
      let bestMove=event.data.split(" ")[1];

      game.move({
        from:bestMove.substring(0,2),
        to:bestMove.substring(2,4),
        promotion:'q'
      });

      board.position(game.fen());
      addMove(bestMove);

      currentTurn="white";
    }
  };
}

board=Chessboard('board',{
  draggable:true,
  position:'start',
  pieceTheme:
'https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png',
  onDrop:onDrop
});

game=new Chess();
engine=new Worker("https://cdn.jsdelivr.net/npm/stockfish@16.1.0/src/stockfish.js");

startTimer();

</script>

</body>
</html>
