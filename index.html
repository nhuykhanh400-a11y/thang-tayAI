<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chess AI</title>

<style>
body {
  background: #1e1e1e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: Arial;
}

#board {
  width: 480px;
  height: 480px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 4px solid #333;
}

.square {
  width: 60px;
  height: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  cursor: grab;
  user-select: none;
}

.light { background: #f0d9b5; }
.dark { background: #b58863; }

.square:active {
  cursor: grabbing;
}
</style>
</head>

<body>

<div id="board"></div>

<script>
const board = document.getElementById("board");

const pieces = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

let position = [
  "rnbqkbnr",
  "pppppppp",
  "........",
  "........",
  "........",
  "........",
  "PPPPPPPP",
  "RNBQKBNR"
];

let draggedSquare = null;

function createBoard() {
  board.innerHTML = "";
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const square = document.createElement("div");
      square.classList.add("square");
      square.classList.add((row + col) % 2 === 0 ? "light" : "dark");

      const piece = position[row][col];
      if (piece !== ".") {
        square.textContent = pieces[piece];
        square.draggable = true;
      }

      square.dataset.row = row;
      square.dataset.col = col;

      board.appendChild(square);
    }
  }
}

createBoard();

// ====== DRAG ======
board.addEventListener("dragstart", e => {
  if (e.target.classList.contains("square") && e.target.textContent !== "") {
    draggedSquare = e.target;

    const img = new Image();
    img.src =
      "data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxJyBoZWlnaHQ9JzEnPjwvc3ZnPg==";
    e.dataTransfer.setDragImage(img, 0, 0);
  }
});

board.addEventListener("dragover", e => e.preventDefault());

board.addEventListener("drop", e => {
  if (!draggedSquare) return;

  const target = e.target;
  if (!target.classList.contains("square")) return;

  const fromRow = +draggedSquare.dataset.row;
  const fromCol = +draggedSquare.dataset.col;
  const toRow = +target.dataset.row;
  const toCol = +target.dataset.col;

  const piece = position[fromRow][fromCol];

  if (isValidMove(piece, fromRow, fromCol, toRow, toCol)) {
    movePiece(fromRow, fromCol, toRow, toCol);
  }

  draggedSquare = null;
});

// ===== MOVE LOGIC =====

function movePiece(fr, fc, tr, tc) {
  position[tr] =
    position[tr].substring(0, tc) +
    position[fr][fc] +
    position[tr].substring(tc + 1);

  position[fr] =
    position[fr].substring(0, fc) +
    "." +
    position[fr].substring(fc + 1);

  createBoard();
}

// ===== RULES =====

function isValidMove(piece, fr, fc, tr, tc) {
  const dr = tr - fr;
  const dc = tc - fc;

  const targetPiece = position[tr][tc];

  const isWhite = piece === piece.toUpperCase();
  const isTargetWhite = targetPiece === targetPiece.toUpperCase();

  if (targetPiece !== "." && isWhite === isTargetWhite) return false;

  switch (piece.toLowerCase()) {

    case "p": // Pawn
      const dir = isWhite ? -1 : 1;
      if (dc === 0 && dr === dir && targetPiece === ".") return true;
      if (Math.abs(dc) === 1 && dr === dir && targetPiece !== ".") return true;
      return false;

    case "r": // Rook
      if (dr === 0 || dc === 0) return true;
      return false;

    case "n": // Knight
      if (
        (Math.abs(dr) === 2 && Math.abs(dc) === 1) ||
        (Math.abs(dr) === 1 && Math.abs(dc) === 2)
      ) return true;
      return false;

    case "b": // Bishop
      if (Math.abs(dr) === Math.abs(dc)) return true;
      return false;

    case "q": // Queen
      if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) return true;
      return false;

    case "k": // King
      if (Math.abs(dr) <= 1 && Math.abs(dc) <= 1) return true;
      return false;
  }

  return false;
}

</script>

</body>
</html>
