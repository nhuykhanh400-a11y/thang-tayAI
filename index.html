<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chess AI</title>

<style>
body {
  background: #1e1e1e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: Arial;
}

#board {
  width: 480px;
  height: 480px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 4px solid #333;
}

.square {
  width: 60px;
  height: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  cursor: pointer;
  user-select: none;
}

.light { background: #f0d9b5; }
.dark { background: #b58863; }

.selected {
  outline: 3px solid yellow;
}
</style>
</head>

<body>

<div id="board"></div>

<script>
const board = document.getElementById("board");

const pieces = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

let position = [
  "rnbqkbnr",
  "pppppppp",
  "........",
  "........",
  "........",
  "........",
  "PPPPPPPP",
  "RNBQKBNR"
];

let selected = null;

function createBoard() {
  board.innerHTML = "";
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {

      const square = document.createElement("div");
      square.classList.add("square");
      square.classList.add((row + col) % 2 === 0 ? "light" : "dark");

      const piece = position[row][col];
      if (piece !== ".") {
        square.textContent = pieces[piece];
      }

      square.dataset.row = row;
      square.dataset.col = col;

      square.addEventListener("click", onSquareClick);

      board.appendChild(square);
    }
  }
}

createBoard();

function onSquareClick(e) {
  const square = e.target;
  const row = +square.dataset.row;
  const col = +square.dataset.col;

  const piece = position[row][col];

  // Nếu chưa chọn quân
  if (!selected) {
    if (piece !== ".") {
      selected = { row, col };
      square.classList.add("selected");
    }
    return;
  }

  const fromRow = selected.row;
  const fromCol = selected.col;
  const movingPiece = position[fromRow][fromCol];

  if (isValidMove(movingPiece, fromRow, fromCol, row, col)) {
    movePiece(fromRow, fromCol, row, col);
  }

  selected = null;
  createBoard();
}

function movePiece(fr, fc, tr, tc) {
  position[tr] =
    position[tr].substring(0, tc) +
    position[fr][fc] +
    position[tr].substring(tc + 1);

  position[fr] =
    position[fr].substring(0, fc) +
    "." +
    position[fr].substring(fc + 1);
}

function isValidMove(piece, fr, fc, tr, tc) {
  const dr = tr - fr;
  const dc = tc - fc;
  const targetPiece = position[tr][tc];

  const isWhite = piece === piece.toUpperCase();
  const isTargetWhite = targetPiece === targetPiece.toUpperCase();

  if (targetPiece !== "." && isWhite === isTargetWhite) return false;

  switch (piece.toLowerCase()) {

    case "p":
      const dir = isWhite ? -1 : 1;
      if (dc === 0 && dr === dir && targetPiece === ".") return true;
      if (Math.abs(dc) === 1 && dr === dir && targetPiece !== ".") return true;
      return false;

    case "r":
      if (dr === 0 || dc === 0) return true;
      return false;

    case "n":
      if (
        (Math.abs(dr) === 2 && Math.abs(dc) === 1) ||
        (Math.abs(dr) === 1 && Math.abs(dc) === 2)
      ) return true;
      return false;

    case "b":
      if (Math.abs(dr) === Math.abs(dc)) return true;
      return false;

    case "q":
      if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) return true;
      return false;

    case "k":
      if (Math.abs(dr) <= 1 && Math.abs(dc) <= 1) return true;
      return false;
  }

  return false;
}

</script>

</body>
</html>
