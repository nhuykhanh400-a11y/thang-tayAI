<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chess AI</title>

<style>
body {
  background: #1e1e1e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: Arial;
}

#board {
  width: 480px;
  height: 480px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  border: 4px solid #333;
}

.square {
  width: 60px;
  height: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  cursor: grab;
}

.light { background: #f0d9b5; }
.dark { background: #b58863; }

.square:active {
  cursor: grabbing;
}
</style>
</head>

<body>

<div id="board"></div>

<script>
const board = document.getElementById("board");

const pieces = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

const startPosition = [
  "rnbqkbnr",
  "pppppppp",
  "........",
  "........",
  "........",
  "........",
  "PPPPPPPP",
  "RNBQKBNR"
];

// ===== FIX DRAG & DROP CHUẨN =====

let draggedPiece = null;

// Khi bắt đầu kéo
document.addEventListener("dragstart", function(e) {
  if (e.target.classList.contains("square") && e.target.textContent !== "") {
    draggedPiece = e.target;

    // Xóa bóng mờ mặc định
    const img = new Image();
    img.src =
      "data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxJyBoZWlnaHQ9JzEnPjwvc3ZnPg==";
    e.dataTransfer.setDragImage(img, 0, 0);
  }
});

// Cho phép thả
document.addEventListener("dragover", function(e) {
  e.preventDefault();
});

// Khi thả quân
document.addEventListener("drop", function(e) {
  if (!draggedPiece) return;

  const target = e.target;

  if (target.classList.contains("square")) {

    // Nếu thả vào chính ô cũ → không làm gì
    if (target === draggedPiece) {
      draggedPiece = null;
      return;
    }

    // Di chuyển quân
    target.textContent = draggedPiece.textContent;
    draggedPiece.textContent = "";

    draggedPiece = null;
  }
});
